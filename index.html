<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEGASCATTER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <img id="pagcor-logo" src="https://upload.wikimedia.org/wikipedia/commons/c/c9/PAGCOR_logo_%282023%29.svg" alt="PAGCOR Logo">
        
        <div class="stats">
            <div>Balance: <span id="balance">100.00</span></div>
            <div class="bet-container">
                Bet:   <input type="number" id="betInput" value="10" min="1" step="1">
            </div>
        </div>
    
        <div class="slot-grid" id="slotGrid"></div>

        <div class="controls">
            <button id="spinBtn">SPIN</button>
            <button id="autoBtn">AUTO: OFF</button>
            <div id="status">Ready to Play</div>

        </div>
        <footer>
            <div class="footer-site-name">MEGASCATTER</div>
            <div class="footer-note">Gamble Responsibly. 21+ only.</div>
        </footer>
         <img id="gcash-logo" src="https://brandlogos.net/wp-content/uploads/2024/01/gcash-logo_brandlogos.net_kiaqh.png" alt="GCash">
         <img id="keitho" src="src/keith.png" alt="Keith">
    </div>
    <script src="app.js"></script>
</body>
</html>
